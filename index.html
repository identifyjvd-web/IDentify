<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Portal</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at top right, #047857 0%, #064e3b 30%, #0f172a 80%);
            color: #ffffff;
            overflow: hidden;
        }

        /* Glass Card Container */
        .splash-container {
            text-align: center;
            padding: 3rem;
            border-radius: 2rem;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Logo Area */
        .logo-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .logo-wrapper i {
            font-size: 2.2rem;
            color: #ffffff;
        }

        /* Glow effect */
        .logo-glow {
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 1.6rem;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.6;
            animation: pulse 2.5s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.4; filter: blur(8px); }
            100% { opacity: 0.8; filter: blur(16px); }
        }

        /* Title & Loading Info */
        .title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        /* Custom Progress Bar */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #10b981, #34d399);
            border-radius: 99px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px #10b981;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBMZ3LUNSQubKjanv4MNyDNsvKwPmsKQY8",
            authDomain: "id3files.firebaseapp.com",
            projectId: "id3files",
            storageBucket: "id3files.firebasestorage.app",
            messagingSenderId: "839961631978",
            appId: "1:839961631978:web:4300cbe1fcb1461878cb93"
        };

        const progressBar = document.getElementById('progress-bar');
        
        function setProgress(val) {
            if (progressBar) progressBar.style.width = val + '%';
        }

        // Simulate progress while Firebase initializes
        let simulatedProgress = 0;
        const progressInterval = setInterval(() => {
            if (simulatedProgress < 85) {
                simulatedProgress += Math.floor(Math.random() * 15) + 5;
                if (simulatedProgress > 85) simulatedProgress = 85;
                setProgress(simulatedProgress);
            }
        }, 150);

        try {
            window.firebaseLoadedInIndex = true;
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                clearInterval(progressInterval);
                setProgress(100);
                
                setTimeout(() => {
                    if (user) {
                        if (user.email && (user.email.toLowerCase().includes('admin') || user.email.toLowerCase() === 'identify.jvd@gmail.com')) {
                            window.location.replace('Admin_Panel.html');
                        } else {
                            window.location.replace('School_Panel.html');
                        }
                    } else {
                        window.location.replace('Login_Panel.html');
                    }
                }, 200);
            });
        } catch (e) {
            console.error("Routing error:", e);
            clearInterval(progressInterval);
            setProgress(100);
            setTimeout(() => {
                window.location.replace('Login_Panel.html');
            }, 200);
        }
    </script>
    <script>
        // Fallback: If Firebase fails to load after 3 seconds, route to login.
        setTimeout(() => {
            if (!window.firebaseLoadedInIndex) {
                console.warn("Firebase took too long to load or failed. Redirecting to Login...");
                const bar = document.getElementById('progress-bar');
                if (bar) bar.style.width = '100%';
                setTimeout(() => {
                    window.location.replace('Login_Panel.html');
                }, 200);
            }
        }, 3000);
    </script>
</head>

<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <h1 class="title">Secure Identity Portal</h1>
        <p class="subtitle">Connecting to application services...</p>
        
        <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <!-- Service Worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>

</html>
